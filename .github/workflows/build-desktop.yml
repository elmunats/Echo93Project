name: Build Desktop App
on:
  push:
    branches: [ main ] # Sesuaikan dengan nama branch utama Akang

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Diperbarui ke v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Diperbarui ke v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build EXE Package
        run: ./gradlew packageExe

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4 # INI YANG WAJIB DIUBAH KE V4
        with:
          name: HDM-POS-Windows
          path: composeApp/build/compose/binaries/main/exe/
